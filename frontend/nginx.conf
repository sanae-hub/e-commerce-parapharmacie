server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Proxy API vers le backend Railway
    location /api/ {
        proxy_pass https://e-commerce-parapharmacie-production.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host e-commerce-parapharmacie-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy Socket.io vers le backend Railway
    location /socket.io/ {
        proxy_pass https://e-commerce-parapharmacie-production.up.railway.app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host e-commerce-parapharmacie-production.up.railway.app;
        proxy_ssl_server_name on;
    }

    # SPA fallback — toutes les routes React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
